<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCP 库 · AI Coding 信息平台</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./mcp.css" />
  </head>
  <body class="mcp-page">
    <header class="top mcp-header">
      <div class="header-row">
        <div>
          <h1>MCP 库</h1>
          <p>MCP 雷达：策展 Top 20 + 全量索引 + 变更检测 · 覆盖 Cursor / Claude / Copilot / VS Code</p>
        </div>
        <nav class="site-nav" aria-label="站点导航">
          <a class="nav-link" href="./index.html">门户首页</a>
          <a class="nav-link" href="./evolution.html">竞品演进</a>
          <a class="nav-link" href="./skills.html">Skill 库</a>
          <a class="nav-link active" href="./mcp.html" aria-current="page">MCP 库</a>
        </nav>
      </div>
    </header>

    <section class="panel mcp-primer-panel" id="mcpPrimerPanel" aria-label="MCP 第一性原理介绍">
      <div class="primer-header">
        <div>
          <h2 id="primerTitle">MCP 第一性原理</h2>
          <p id="primerSubtitle" class="primer-subtitle"></p>
        </div>
        <button type="button" class="primer-toggle" id="primerToggle" aria-expanded="true" aria-controls="primerBody">
          收起
        </button>
      </div>
      <div id="primerBody" class="primer-body">
        <nav class="primer-tabs" id="primerTabs" aria-label="原理介绍分区"></nav>
        <div id="primerContent" class="primer-content"></div>
      </div>
    </section>

    <section class="panel mcps-meta" id="mcpsMeta"></section>

    <section class="panel mcp-changes-panel" id="mcpChangesPanel" hidden>
      <div class="section-title">
        <h2>MCP 雷达 · 近期变更</h2>
        <span id="changesCount"></span>
      </div>
      <ul id="mcpChangesList" class="mcp-changes-list"></ul>
    </section>

    <nav class="panel view-nav" aria-label="视图切换">
      <div id="viewTabs" class="view-tabs"></div>
    </nav>

    <nav class="panel platform-nav" aria-label="平台筛选">
      <div id="platformTabs" class="platform-tabs"></div>
    </nav>

    <main class="mcp-main">
      <aside class="panel mcp-filters">
        <h2>筛选</h2>
        <input id="mcpSearch" type="search" placeholder="搜索 MCP 名称、分类、工具..." />

        <label for="transportFilter">传输协议</label>
        <select id="transportFilter">
          <option value="all">全部协议</option>
        </select>

        <label for="categoryFilter">分类</label>
        <select id="categoryFilter">
          <option value="all">全部分类</option>
        </select>

        <label class="checkbox-row">
          <input id="featuredOnly" type="checkbox" />
          仅显示 Top 精选
        </label>

        <div class="sync-info" id="syncInfo"></div>
      </aside>

      <section class="panel mcp-content">
        <div class="section-title">
          <h2>MCP Server 列表</h2>
          <span id="mcpCount"></span>
        </div>
        <div class="tabs" id="transportQuickTabs"></div>
        <div id="mcpGrid" class="mcp-grid" role="list"></div>
        <p id="emptyMcps" class="empty-state" hidden>没有匹配的 MCP Server。</p>
      </section>

      <aside class="panel mcp-detail-panel">
        <h2>MCP 详情</h2>
        <article id="mcpDetail" class="mcp-detail">
          <p>请从左侧列表选择一个 MCP Server 查看配置示例与工具清单。</p>
        </article>
      </aside>
    </main>

    <div id="mcpModal" class="modal" hidden aria-hidden="true">
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-dialog mcp-modal-dialog" role="dialog" aria-modal="true">
        <button type="button" class="modal-close" aria-label="关闭详情" data-close="true">×</button>
        <article id="mcpModalDetail" class="modal-detail"></article>
      </div>
    </div>

    <script src="./mcp.js?v=1"></script>
  </body>
</html>
