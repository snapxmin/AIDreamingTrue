name: Collect skills and deploy

on:
  workflow_dispatch:
  schedule:
    # 每周一 09:00 北京时间 = 01:00 UTC（Skill 元数据变更频率低于事件流）
    - cron: "0 1 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  collect-skills-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run skills collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/collect_skills.py

      - name: Run skill feedback collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/collect_skill_feedback.py

      - name: Commit updated skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/skills.json data/skills-index.json data/skills-snapshot.json data/skill-changes.json data/skill-event-links.json data/skill-feedback.json data/events.json; then
            echo "No skill data changes to commit."
          else
            git add data/skills.json data/skills-index.json data/skills-snapshot.json data/skill-changes.json data/skill-event-links.json data/skill-feedback.json data/events.json
            git commit -m "chore: auto-collect agent skills $(date -u +%Y-%m-%d)"
            git push origin main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
