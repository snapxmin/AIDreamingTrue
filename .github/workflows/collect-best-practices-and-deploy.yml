name: Collect best practices and deploy

on:
  workflow_dispatch:
  schedule:
    # 每 3 天 09:00 北京时间 = 01:00 UTC（每月 1/4/7/10/13/16/19/22/25/28 日）
    - cron: "0 1 */3 * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  collect-best-practices-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run best practices collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/collect_best_practices.py

      - name: Commit updated best practices data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/best-practices.json; then
            echo "No best practices data changes to commit."
          else
            git add data/best-practices.json
            git commit -m "chore: auto-collect best practices $(date -u +%Y-%m-%d)"
            git push origin main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
